<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #111827;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle radial glow */
    .glow {
      position: absolute;
      width: 820px;
      height: 820px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      text-align: center;
      padding: 0 64px;
    }

    /* Wordmark */
    .wordmark {
      font-size: 132px;
      font-weight: 800;
      letter-spacing: -5px;
      line-height: 1;
      color: #ffffff;
    }

    .wordmark span {
      color: #F97316;
    }

    /* Copy block */
    .copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .headline {
      font-size: 46px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .subhead {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.35;
      max-width: 1040px;
    }

    /* Bottom domain pill */
    .domain {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="wordmark">bill<span>by</span></div>
    <div class="copy">
      <div class="headline">Hands-off timekeeping for law firms.</div>
      <div class="subhead">Every billable minute captured automatically and ready to invoice.</div>
    </div>
    <div class="domain">billby.com.au</div>
  </div>
</body>
</html>
