<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #111827;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle radial glow */
    .glow {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 80px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.35);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fb923c;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F97316;
    }

    /* Wordmark */
    .wordmark {
      font-size: 88px;
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: #ffffff;
    }

    .wordmark span {
      color: #F97316;
    }

    /* Tagline */
    .tagline {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
      max-width: 640px;
    }

    .tagline strong {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* Bottom domain pill */
    .domain {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="badge">
      <div class="badge-dot"></div>
      Billing Intelligence
    </div>
    <div class="wordmark">bill<span>by</span></div>
    <p class="tagline">Every billable minute. <strong>Captured.</strong> Automatically.<br>Billing intelligence for law firms.</p>
    <div class="domain">billby.com.au</div>
  </div>
</body>
</html>
